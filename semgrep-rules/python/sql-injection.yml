rules:
  - id: python.sqlite.dynamic-sql-query
    message: SQL query is built with string interpolation before execution.
    severity: ERROR
    languages:
      - python
    metadata:
      category: security
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - A03:2021 - Injection
      confidence: HIGH
      impact: HIGH
      likelihood: MEDIUM
    patterns:
      - pattern-either:
          - pattern: $CONNECTION.execute(f"...")
          - pattern: $CONNECTION.execute("..." % $VALUE)
          - pattern: $CONNECTION.execute("...".format(...))

