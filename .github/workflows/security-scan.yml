name: Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep with local rules
        run: |
          mkdir -p scanner-results
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
            --config semgrep-rules \
            --json \
            --output scanner-results/semgrep.json \
            app

      - name: Run Checkov against Terraform
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            bridgecrew/checkov:latest \
            --directory infra/terraform \
            --output json \
            --soft-fail \
            > scanner-results/checkov.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Normalize Semgrep findings
        run: python -m analyzer.normalize_semgrep --output scanner-results/semgrep-normalized-findings.json

      - name: Normalize Checkov findings
        run: python -m analyzer.normalize_checkov --output scanner-results/checkov-normalized-findings.json

      - name: Merge normalized findings
        run: |
          python -m analyzer.merge_findings \
            --input scanner-results/semgrep-normalized-findings.json scanner-results/checkov-normalized-findings.json \
            --output scanner-results/normalized-findings.json

      - name: Score normalized findings
        run: python -m analyzer.score_findings

      - name: Generate Markdown risk report
        run: python -m analyzer.generate_report

      - name: Upload security scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-artifacts
          path: |
            scanner-results/*.json
            reports/*.md
          if-no-files-found: error
